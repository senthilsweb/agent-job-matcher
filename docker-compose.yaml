# agent-job-matcher — one-command launch (privacyshield pattern).
#
#   docker compose up -d                        # the whole demo stack
#   docker compose up -d api                    # just the FastAPI backend, :6010
#   docker compose run --rm cli version
#   docker compose run --rm cli analyze \
#     --resume /work/data/resume/synthetic-resume.pdf \
#     --job https://example.com/job --out /work/runs
#
# Full stack, one consistent 6010-series port per service (chosen to
# avoid this machine's other locally-running compose projects —
# 6006/6007 specifically are already an Arize Phoenix container):
#
#   6010  api            REST backend (/analyze, /resume/jsonresume, /health)
#   6011  agent-service  MCP Bridge — LLM-2 chat orchestration (ADR 0001).
#                        The MCP server (mcp/index.js) has no port of its
#                        own: it's a pure stdio bridge, spawned as a child
#                        process inside THIS container (see
#                        mcp/agent-service/Dockerfile) — there's no
#                        separate "MCP" service to run.
#   6012  playground     resume + job links -> visual fit reports
#   6013  openapi-docs   branded API reference
#   6014  chat-demo      the mcp-chat-client demo page (chatbot widget)
#
# Uses the published GHCR images (amd64-only; `platform: linux/amd64` on
# each image+build service pins that explicitly, so Apple Silicon hosts
# pull + emulate instead of silently falling back to a local build —
# `docker compose pull` will tell you plainly if a pull genuinely can't
# happen, e.g. a still-private package, rather than building without
# saying why). `docker compose build` forces a local rebuild regardless.
# Configuration: env_file loads the root .env; the environment blocks
# below list every variable inline (documentation + per-run override via
# `VAR=x docker compose up`). Inline entries use ${VAR:-default}
# interpolation, which compose resolves from your shell and the root
# .env — so .env remains the single source of truth. Empty values are
# treated as unset by the app (telemetry backends stay inactive).

x-jobmatcher-env: &jobmatcher-env
  # --- model (required) ---
  MODEL_ANALYST: ${MODEL_ANALYST:-openai:gpt-5.4-mini}
  MODEL: ${MODEL:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  # --- pipeline ---
  JOB_FANOUT_CONCURRENCY: ${JOB_FANOUT_CONCURRENCY:-3}
  JOB_MIN_WORDS: ${JOB_MIN_WORDS:-100}
  MAX_FETCH_BYTES: ${MAX_FETCH_BYTES:-2000000}
  MAX_RESUME_BYTES: ${MAX_RESUME_BYTES:-20000000}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  # --- telemetry (fill a block to enable that backend) ---
  OBSERVABILITY_SINK: ${OBSERVABILITY_SINK:-json}
  TELEMETRY_RECORD_IO: ${TELEMETRY_RECORD_IO:-false}
  OPENOBSERVE_URL: ${OPENOBSERVE_URL:-}
  OPENOBSERVE_ORG: ${OPENOBSERVE_ORG:-default}
  OPENOBSERVE_STREAM: ${OPENOBSERVE_STREAM:-job_matcher}
  OPENOBSERVE_USER: ${OPENOBSERVE_USER:-}
  OPENOBSERVE_PASSWORD: ${OPENOBSERVE_PASSWORD:-}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-}
  PHOENIX_API_KEY: ${PHOENIX_API_KEY:-}
  ARIZE_SPACE_ID: ${ARIZE_SPACE_ID:-}
  ARIZE_API_KEY: ${ARIZE_API_KEY:-}
  ARIZE_PROJECT_NAME: ${ARIZE_PROJECT_NAME:-job-matcher}

services:
  api:
    image: ghcr.io/senthilsweb/agent-job-matcher:latest
    # This image is published amd64-only (build-and-publish.yml, a
    # deliberate CI-speed tradeoff). Without a `platform:` pin, Compose
    # can't find an arm64 manifest on Apple Silicon and silently falls
    # back to `build:` instead — confirmed via `docker compose pull api`
    # ("no matching manifest for linux/arm64/v8"). Pinning amd64
    # explicitly makes Compose pull the real image and run it under
    # Docker Desktop's emulation (the workflow comment's original
    # intent), matching privacyshield's own platform-pin pattern.
    # `pull_policy: missing` then does what it says: pull the tag if not
    # cached, never build unless you explicitly ask (`docker compose
    # build` / `up --build`).
    platform: linux/amd64
    pull_policy: missing
    build: .
    entrypoint: ["uvicorn", "job_matcher.api:app", "--host", "0.0.0.0", "--port", "6010"]
    env_file: .env
    environment:
      <<: *jobmatcher-env
      API_UPLOAD_DIR: ${API_UPLOAD_DIR:-/work/uploads}
    ports:
      - "6010:6010"
    volumes:
      - ./runs:/work/runs
      - uploads:/work/uploads
    restart: unless-stopped

  cli:
    profiles: ["cli"]
    image: ghcr.io/senthilsweb/agent-job-matcher:latest
    platform: linux/amd64
    pull_policy: missing
    build: .
    env_file: .env
    environment:
      <<: *jobmatcher-env
    volumes:
      - ./runs:/work/runs
      - ./backend/evals/data:/work/data:ro

  # --- demo stack (add-demo-stack-and-playground) ---------------------

  agent-service:
    build:
      context: .
      dockerfile: mcp/agent-service/Dockerfile
    env_file: .env
    environment:
      MODEL_ANALYST: ${MODEL_ANALYST:-openai:gpt-5.4-mini}
      MODEL_CHAT: ${MODEL_CHAT:-}
      MODEL: ${MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Container-network hostname for the REST backend, not localhost —
      # this is what the spawned MCP server (mcp/index.js) calls.
      JOBMATCHER_API_URL: http://api:6010
      AGENT_UPLOAD_DIR: /work/uploads
      # Telemetry — same fan-out as the api service.
      OBSERVABILITY_SINK: ${OBSERVABILITY_SINK:-json}
      TELEMETRY_RECORD_IO: ${TELEMETRY_RECORD_IO:-false}
      OPENOBSERVE_URL: ${OPENOBSERVE_URL:-}
      OPENOBSERVE_ORG: ${OPENOBSERVE_ORG:-default}
      OPENOBSERVE_STREAM: ${OPENOBSERVE_STREAM:-job_matcher}
      OPENOBSERVE_USER: ${OPENOBSERVE_USER:-}
      OPENOBSERVE_PASSWORD: ${OPENOBSERVE_PASSWORD:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-}
      PHOENIX_API_KEY: ${PHOENIX_API_KEY:-}
      ARIZE_SPACE_ID: ${ARIZE_SPACE_ID:-}
      ARIZE_API_KEY: ${ARIZE_API_KEY:-}
      ARIZE_PROJECT_NAME: ${ARIZE_PROJECT_NAME:-job-matcher}
    ports:
      - "6011:6011"
    volumes:
      - uploads:/work/uploads
    depends_on:
      - api
    restart: unless-stopped

  chat-demo:
    # mcp-chat-client lives in a sibling repo, not a subfolder of this
    # one — the published image is the primary path here; `build:` only
    # resolves if you have both repos checked out side by side.
    image: ghcr.io/senthilsweb/mcp-chat-client:latest
    # Also amd64-only (mcp-chat-client's build-and-publish.yml) — same
    # platform pin, same reason as `api` above.
    platform: linux/amd64
    pull_policy: missing
    build: ../mcp-chat-client
    environment:
      # Now that agent-service is a real compose service, point at it by
      # name on the compose network — no more host.docker.internal
      # fallback needed for the all-in-one-stack case. Override this if
      # you're running the chat-demo image against an external
      # agent-service instead.
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL:-http://agent-service:6011}
    ports:
      - "6014:80"
    depends_on:
      - agent-service
    restart: unless-stopped

  playground:
    build: ./playground
    environment:
      # Container-network hostname (the `api` service above), not
      # localhost — only the playground's own server-side route handler
      # ever reads this; the browser never sees it.
      API_URL: ${API_URL:-http://api:6010}
      PORT: "6012"
    ports:
      - "6012:6012"
    depends_on:
      - api
    restart: unless-stopped

  openapi-docs:
    build: ./openapi-docs
    environment:
      API_URL: ${API_URL:-http://api:6010}
      PORT: "6013"
    ports:
      - "6013:6013"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  # Shared upload landing zone — both api (API_UPLOAD_DIR) and
  # agent-service (AGENT_UPLOAD_DIR) mount this (ADR 0001 upload flow).
  uploads:
