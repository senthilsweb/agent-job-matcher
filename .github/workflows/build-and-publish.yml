name: Build & publish

# Modelled on privacyshield's build-and-publish.yml. Publishes every image
# this repo produces to GHCR — the backend/CLI, the agent-service (MCP
# Bridge), the playground, and the openapi-docs apps — so a production
# deployment can run entirely from pulled images with zero local builds.
# Auth uses the workflow's built-in GITHUB_TOKEN via the
# `packages: write` permission — no repository secrets required.
#
# NOTE: each package is created PRIVATE on its first-ever publish. Making
# it public is a one-time manual step per package (GitHub → Packages →
# <package> → Package settings → Change visibility) — there is no API
# for it. agent-job-matcher has already been flipped; the three
# sub-images need the same treatment after their first publish.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    # Bot commits that can't change the image (graph refreshes, spec/docs
    # edits) shouldn't burn a build.
    paths-ignore:
      - "graph*.json"
      - "graph.html"
      - "GRAPH_REPORT.md"
      - "graph-manifest.json"
      - "openspec/**"
      - "**/*.md"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backend + CLI (the original image, name unchanged)
          - image: senthilsweb/agent-job-matcher
            context: .
            dockerfile: ./Dockerfile
          # MCP Bridge — repo-root context so it can COPY backend/ and mcp/
          - image: senthilsweb/agent-job-matcher-agent-service
            context: .
            dockerfile: ./mcp/agent-service/Dockerfile
          # Next.js apps — their own folders are their build contexts
          - image: senthilsweb/agent-job-matcher-playground
            context: ./playground
            dockerfile: ./playground/Dockerfile
          - image: senthilsweb/agent-job-matcher-openapi-docs
            context: ./openapi-docs
            dockerfile: ./openapi-docs/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # amd64-only: keeps CI fast. amd64 images run fine on Apple Silicon
      # under Docker Desktop's emulation; arm64-native users can build
      # locally with `docker build .`
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
