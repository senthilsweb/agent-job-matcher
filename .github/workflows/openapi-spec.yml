name: OpenAPI artifact

# Separate from release.yml by design (owner direction): releases are cut
# by semantic-release; this workflow reacts to the published release and
# attaches the API contract to it. Until the API lands (add-job-matcher-cli
# Bolt 4), the export script skips gracefully and nothing is attached.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend + tooling
        run: |
          pip install -e ./backend pyyaml openapi-spec-validator

      - name: Export OpenAPI spec
        id: export
        run: |
          python scripts/export-openapi.py dist
          if [ -f dist/openapi.json ]; then
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate spec
        if: steps.export.outputs.generated == 'true'
        run: openapi-spec-validator dist/openapi.json

      - name: Attach to GitHub Release
        if: steps.export.outputs.generated == 'true' && github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/openapi.json dist/openapi.yaml --clobber

      - name: Upload as workflow artifact (dispatch runs)
        if: steps.export.outputs.generated == 'true' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: dist/openapi.*
