name: Graphify Knowledge Graph

# Modelled on templrgo's graphify.yml with one deliberate divergence
# (owner decision, 2026-07-11): the generated graph is committed to the
# ROOT of main (graph.json, graph-index.json, graph-manifest.json), not
# to an orphan branch — this repo is small enough that the artifacts
# stay lightweight. Loop protection is two-fold: the [skip graphify]
# commit marker and the paths filter (the graph files are not in it).

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'openspec/**'
      - 'scripts/**'
      - '.github/workflows/graphify.yml'
  schedule:
    # Weekly full rebuild — Mondays 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: graphify
  cancel-in-progress: true

jobs:
  graphify:
    if: "!contains(github.event.head_commit.message, '[skip graphify]')"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRAPHIFY_VERSION: '0.4.23'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install graphify
        run: |
          pip install --upgrade pip
          pip install "graphifyy==${GRAPHIFY_VERSION}"
          graphify --help >/dev/null

      - name: Regenerate knowledge graph
        id: gen
        continue-on-error: true
        env:
          # OPENAI_API_KEY is wired for graphify's LLM-backed semantic pass;
          # `graphify update` itself is deterministic and free (extraction +
          # community clustering + report, no LLM), so the key is a no-op
          # today and activates automatically if graphify grows CI-side
          # semantic extraction.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: |
          set -e
          # Full deterministic generation: AST extraction + graph build +
          # Leiden/Louvain community clustering + interactive graph.html +
          # GRAPH_REPORT.md — everything graphify can do without an LLM.
          graphify update "${GITHUB_WORKSPACE:-.}"
          python scripts/graphify-index.py graphify-out/graph.json graphify-out/graph-index.json "${GITHUB_WORKSPACE:-.}"

      - name: Commit graph to repo root
        if: steps.gen.outcome == 'success'
        run: |
          set -e
          cp graphify-out/graph.json graph.json
          cp graphify-out/graph-index.json graph-index.json
          cp graphify-out/graph.html graph.html
          cp graphify-out/GRAPH_REPORT.md GRAPH_REPORT.md
          cat > graph-manifest.json <<EOF
          {
            "version": 1,
            "source_repo": "${{ github.repository }}",
            "source_sha": "${GITHUB_SHA}",
            "source_ref": "${GITHUB_REF}",
            "graphify_version": "${GRAPHIFY_VERSION}",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          git config user.name "graphify-bot"
          git config user.email "graphify-bot@users.noreply.github.com"
          git add graph.json graph-index.json graph-manifest.json graph.html GRAPH_REPORT.md
          if git diff --cached --quiet; then
            echo "Graph unchanged — nothing to commit."
          else
            git commit -m "graph: update knowledge graph for ${GITHUB_SHA::7} [skip graphify]"
            # The release bot may push to main concurrently — rebase, don't race
            git pull --rebase origin main
            git push
          fi

      - name: Upload artifacts (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphify-output-${{ github.run_id }}
          path: graphify-out/
          retention-days: 7
          if-no-files-found: ignore

      - name: Open or update tracking issue on failure
        if: steps.gen.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Graphify run failed';
            const body = [
              `Latest failure on commit \`${context.sha.substring(0,7)}\`.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `This issue is auto-updated. \`main\` pushes are NOT blocked by graphify failures.`
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'graphify-failure',
              per_page: 5,
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['graphify-failure', 'automation'],
              });
            } else {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            }
