# Build the wiki (MkDocs Material) and deploy it to GitHub Pages.
# Spec: openspec/changes/project-wiki/ — pattern shared with
# senthilsweb/ai-agents (job-scout-docs.yml).
#
# One-time repo setup: Settings -> Pages -> Source = "GitHub Actions".
name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site (strict — broken links fail)
        # mkdocs pinned <2: the 2.0 rewrite drops the plugin system
        # mkdocs-material 9.x depends on.
        run: |
          pip install --quiet "mkdocs-material==9.*" "mkdocs<2"
          mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
